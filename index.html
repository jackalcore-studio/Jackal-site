<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jackal</title>

  <style>
    body {
      margin: 0;
      background: #0f0f0f;
      color: white;
      font-family: Arial, sans-serif;

      display: flex;
      justify-content: center;
      align-items: center;

      height: 100vh;
      text-align: center;
    }

    .card {
      background: #1c1c1c;
      padding: 40px;
      border-radius: 20px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 0 25px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.8;
    }

    .button {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 24px;
      border-radius: 10px;
      background: #5865F2;
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    .button:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Jackal</h1>

    <p>
      chaos creature containment zone
    </p>

    <a class="button" href="https://discord.com/oauth2/authorize?client_id=1481897380335980636">
      Join Discord
    </a>
  </div>
</body>
</html>
